<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
// Redirect /teachers to /schools, preserve everything else
var path = window.location.pathname;
if (path === '/teachers' || path === '/teachers.html' || path === '/teachers-v2' || path === '/teachers-v2.html') {
  window.location.replace('/schools');
} else {
  window.location.replace('/');
}
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
