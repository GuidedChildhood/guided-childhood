
# Task definitions for the Guided Childhood crew.
# Context injection (passing real upstream outputs) is handled in daily_briefing.py.
# The {date} placeholder is substituted at runtime with today's ISO date.
# Each task description tells the agent how to USE their teammates' outputs.

scout_task:
  description: >
    Research today's ({date}) most important UK news in education,
    safeguarding and children's digital literacy. Prioritise:
    Department for Education and Ofqual announcements, the Online Safety Act
    and Ofcom enforcement, NSPCC / Internet Matters / Childnet reports, Ofsted
    framework changes, notable EdTech moves, and — critically — any
    announcements by Prime Minister Keir Starmer, DCMS, or DSIT regarding
    social media companies and tech regulation (age verification, algorithm
    accountability, duty of care enforcement, platform fines, or new
    government commitments on children's online safety). Check Starmer's
    official social media accounts, gov.uk press releases, and UK political
    news sources for the latest tech policy signals. Use web search to verify
    and find sources. For each item explain in one line WHY it matters to
    Guided Childhood, a platform helping children aged 4-16 navigate digital
    life safely. Your findings will be read by Navigator, Sage, Diego and
    Herald — make them specific and actionable.
  expected_output: >
    A 3-5 bullet intelligence briefing. Each bullet: a one-line headline, a
    one-line "why it matters to Guided Childhood", and a source link.
    No preamble, no filler. Be specific — vague summaries are useless to the team.
    If there is a Starmer / government tech policy release today, flag it first.
    End with exactly two lines:
    YOUR ACTION TODAY: [one concrete sentence telling the founder what to do right now]
    YOUR QUESTION: [one question you need answered to do better tomorrow]

guardian_task:
  description: >
    Monitor NSPCC, Ofsted, Ofcom and UK government sources for the most
    significant child-safety / safeguarding development relevant to Guided
    Childhood as of {date}. Use web search. Child welfare is the priority —
    be responsible and never fear-monger. Your safeguarding read will be passed
    directly to Navigator so they can use it when crafting outreach to DSLs
    and Headteachers — make your "how Guided Childhood should respond"
    recommendation concrete enough to become an outreach hook.
  expected_output: >
    One clearly-stated key safeguarding development (with source link) followed
    by a short, concrete "How Guided Childhood should respond" recommendation
    (2-3 sentences) that genuinely helps schools and children — specific enough
    that Navigator can quote it in a connection message.
    End with exactly two lines:
    YOUR ACTION TODAY: [one concrete sentence telling the founder what to do right now]
    YOUR QUESTION: [one question you need answered to do better tomorrow]

navigator_task:
  description: >
    Identify FIVE high-value LinkedIn outreach targets for Guided Childhood for
    today ({date}): UK Designated Safeguarding Leads, Headteachers, Deputy
    Heads, MAT safeguarding leads or PSHE leads. Use web search to find real,
    plausible profile types and current hooks.

    IMPORTANT — you have received Scout's research briefing and Guardian's
    safeguarding watch as context above. You MUST:
    - Reference at least one specific item from Scout's intelligence as a timely
      outreach hook in at least two of your five messages.
    - Use Guardian's safeguarding development as the relevance hook for at least
      one message — DSLs will respond to something that directly addresses what
      Guardian flagged.
    - Make it obvious in your output which Scout or Guardian finding you used
      for each message. Write it as: "Hook used: [finding from Scout/Guardian]".
    Children's online safety must be the genuine value lead — never salesy.
  expected_output: >
    A numbered list of 5 targets. For each: (a) role + type of school/MAT,
    (b) why they are a good fit today specifically (cite the team intelligence),
    (c) a personalised connection message under 300 characters that leads with
    value, and (d) "Hook used: [exact finding from Scout or Guardian]".
    End with exactly two lines:
    YOUR ACTION TODAY: [one concrete sentence — e.g. "Send message #1 to the DSL at X academy right now"]
    YOUR QUESTION: [one question you need answered to do better tomorrow]

sage_task:
  description: >
    Write content for today ({date}) for UK educators, DSLs and Headteachers.
    Position Justin Phillips / Guided Childhood as the trusted voice on digital
    childhood and online safety for ages 4-16.

    IMPORTANT — you have received Scout's research briefing as context above.
    You MUST build all posts around a specific news hook Scout surfaced today.
    Do not invent a hook — use a real finding. Quote or paraphrase naturally.
    Start your output with: "News hook used: [the Scout finding you built on]"

    YOU MUST PRODUCE THREE VERSIONS:

    VERSION 1 — LINKEDIN (280-350 words. COUNT BEFORE FINALISING.):
    Full-length post. Warm, authoritative, practical. Strong opening line,
    one clear takeaway, a call to engagement, 3-5 relevant hashtags.
    Professional audience of educators and DSLs. No buzzwords, no filler.
    Short lines — one sentence per line where possible. No exclamation marks.

    VERSION 2 — INSTAGRAM (100-130 words):
    Personal and direct. Written as Justin Phillips the person, not a brand.
    First line MUST work as a standalone hook before the "more" cut
    (keep it under 120 characters). Conversational — "I", "my", "we" is fine.
    One insight, one question to drive comments.
    5-7 hashtags at the end on a separate line. No LinkedIn-style framing.

    VERSION 3 — FACEBOOK (130-170 words):
    Conversational — written like you're talking to people you know.
    Can open with a personal observation rather than a statistic.
    Friends sharing this is the growth mechanism — write for sharability.
    2-3 hashtags maximum, or none. More personal tone than LinkedIn.
    Same core message, different register.

  expected_output: >
    First line: "News hook used: [Scout finding]"

    ## LINKEDIN VERSION
    [280-350 word post — state word count: "Word count: X" — with 3-5 hashtags]

    ## INSTAGRAM VERSION
    [100-130 word caption — hook line under 120 chars, 5-7 hashtags on last line]

    ## FACEBOOK VERSION
    [130-170 word personal post, 0-3 hashtags]

    End with exactly two lines:
    YOUR ACTION TODAY: [e.g. "Post LinkedIn before 9am, Instagram at 12pm, Facebook at 6pm"]
    YOUR QUESTION: [one question you need answered to do better tomorrow]

diego_task:
  description: >
    Today is {date}. You are Diego, the brand storytelling and Substack lead.

    You have received Scout's intelligence briefing and Sage's LinkedIn post as
    context above. Read both carefully before choosing your format.

    YOUR JOB HAS FOUR PARTS:

    ---
    PART 1 — LINKEDIN POST (HARD LIMIT: 280-350 words. COUNT BEFORE FINALISING.)

    LinkedIn has a 3,000 character cap and posts over 400 words lose engagement.
    The best-performing posts in this series were tight and precise — not long.
    Do not exceed 350 words under any circumstances.

    CHOOSE ONE FORMAT based on Scout's finding today:

    FORMAT A — WRONG VILLAIN SERIES
    Use when: Scout found a precise effect size, meta-analysis figure, or
    comparative statistic showing the real driver of harm vs the blamed one.
    Structure:
    1. Single number alone on its own line — no preamble
    2. IS/ISN'T — what it IS (the truth), what it ISN'T (the assumption). Direct.
    3. One memorable comparison that makes the number land
    4. Two or more independent sources reaching the same conclusion
    5. Proportionality argument — real driver vs blamed driver, with percentages
    6. "The Wrong Villain series continued" reference
    7. Comment keyword CTA — NEVER put URL in post body (LinkedIn suppresses reach)
       Format: "Drop [KEYWORD] in the comments and I'll send you [resource]."
    8. Repost ask + follow ask — direct, not apologetic
    9. Closing question that invites the sharpest disagreement

    FORMAT B — TRUST FRAMEWORK SERIES
    Use when: Scout found a ban/restriction story, policy debate, or evidence
    about what actually protects children (timing, sleep, platform design,
    algorithmic literacy, family relationships).
    Structure:
    1. Single number alone on its own line — no preamble
    2. IS/ISN'T — what the stat IS vs what governments assume it means
    3. The ban problem — behaviour adapts, harm displaces. Use Australia:
       ban Dec 2025, within months 60% of teens still had access.
    4. The real mechanism — name the TRUST letter driving the harm.
       Cite one specific study for that letter.
    5. TRUST framework — ONE line per letter only: T·R·U·S·T
    6. CTA: "Drop TRUST in the comments — I'll send you the full framework."
    7. Repost ask + follow ask
    8. Closing question a ban-supporter can't easily dismiss

    VOICE RULES (both formats):
    - Short lines. One sentence = one line where possible.
    - No exclamation marks.
    - Never preachy. Evidence first, emotion second.
    - The vulnerable minority is always averaged away — name that.
    - NEVER put a URL in the post body.

    PRE-EMPT these objections naturally (both formats):
    - The average hides a vulnerable minority — concentrated harm is still harm
    - Missing citations — source goes in first comment, not post body
    - Social media as amplifier not originator — use as core thesis
    - Policy aimed at average child ignores the minority most harmed

    ---
    PART 2 — SUBSTACK NEWSLETTER (600-900 words):

    The deep-dive companion to today's LinkedIn post. Goes deeper for
    researchers, clinicians and policy people who followed up in the comments.
    Include:
    - Opening that references the LinkedIn post and what the comments reveal
    - Full citations for every claim (URLs are fine in Substack)
    - Deeper treatment of the 2-3 sharpest objections
    - Narrative arc: how this fits the Wrong Villain / TRUST series
    - CTA: subscribe, share, reply with evidence
    - Formatting: headers (##), pull quotes (>), short paragraphs

    ---
    PART 3 — ONE SELF-EXECUTING CHATGPT PROMPT (under 200 words):

    Write ONE prompt Justin can paste into ChatGPT to produce a future post
    in this exact style. The prompt must:
    - NOT ask clarifying questions — it must execute immediately
    - End with: "TOPIC: [fill in]" and "DATA POINT: [fill in or use latest UK figure]"
    - Encode the voice, format, character limit, and objection pre-empts
    - Specify: NEVER ask for inputs, write the complete post immediately

    ---
    PART 4 — PLATFORM ADAPTATIONS (adapt Part 1 for Instagram, Reels and Facebook):

    Take the core insight and data from Part 1 and rewrite for three platforms.
    Same truth, different register. Do not just shorten Part 1 — genuinely
    rewrite for each platform's audience and algorithm.

    INSTAGRAM CAPTION (120-150 words):
    - First line is the hook — must work before the "more" cut (under 120 characters)
    - Personal voice: written as Justin Phillips the person, not a brand
    - One precise stat, one insight, one question to drive comments
    - 5-8 hashtags on the final line only — not inline
    - No LinkedIn framing ("thought leaders", "professionals") — talk to parents
    - No URLs in caption body

    REEL SCRIPT (30 seconds = 75-90 words, written to be spoken aloud):
    - Seconds 0-3: the hook — the single most surprising number or claim
    - Seconds 4-20: one insight, one comparison that makes it land
    - Seconds 21-27: the TRUST/Wrong Villain frame in one sentence
    - Seconds 28-30: CTA — "follow for more" or "comment GUIDE below"
    - Write as natural spoken words, not formal sentences
    - Note at the end: [Record to camera, no cuts needed, under 30 seconds]

    FACEBOOK POST (150-200 words):
    - Conversational — written like you're talking to people you know personally
    - Can open with a personal observation, a question, or a short story
    - Same core data as LinkedIn but warmer register
    - Friends sharing this organically is the growth mechanism — write for that
    - 0-3 hashtags maximum
    - End with a question that a non-expert parent would genuinely want to answer

  expected_output: >
    Start with: "Format chosen: [Wrong Villain / TRUST Framework] — because [one sentence reason]"
    Start with: "Series hook used: [the Scout finding or data point you built on]"

    ## PART 1 — LINKEDIN POST
    [280-350 word post — state word count at the end: "Word count: X"]

    ## PART 2 — SUBSTACK NEWSLETTER
    [600-900 word newsletter with headers and citations]

    ## PART 3 — CHATGPT PROMPT
    [One self-executing prompt under 200 words, ends with TOPIC: and DATA POINT: fields]

    ## PART 4 — PLATFORM ADAPTATIONS

    ### INSTAGRAM CAPTION
    [120-150 word caption, hook line first, hashtags on last line]

    ### REEL SCRIPT
    [75-90 words spoken, with second-by-second timing notes]
    [Record to camera, no cuts needed, under 30 seconds]

    ### FACEBOOK POST
    [150-200 word personal post, 0-3 hashtags]

    End with exactly two lines:
    YOUR ACTION TODAY: [e.g. "Post LinkedIn now, schedule Instagram for 12pm, Facebook for 6pm, film Reel this evening"]
    YOUR QUESTION: [one question about the series direction or evidence for Justin to answer]

herald_task:
  description: >
    Identify the single best PR opportunity of the day ({date}) for Guided
    Childhood related to children's digital safety — a journalist request, a
    media hook, or a news peg. Use web search.

    IMPORTANT — you have received Scout's research briefing and Sage's LinkedIn
    post as context above. You MUST:
    - Use one of Scout's news items as your PR peg where possible — journalists
      respond to timely, specific angles.
    - Check what angle Sage chose for the LinkedIn post; your PR pitch should
      complement it, not repeat it — find the next best angle.
    Note which Scout finding you are building on.
  expected_output: >
    First line: "Scout finding used: [the item you're building on]"
    Then: the top PR opportunity (outlet/journalist/hook, 1-2 lines) followed by
    a tight 3-sentence pitch Guided Childhood could send today.
    End with exactly two lines:
    YOUR ACTION TODAY: [one concrete sentence — e.g. "Email this pitch to [journalist] at [outlet] today"]
    YOUR QUESTION: [one question you need answered to do better tomorrow]

compass_task:
  description: >
    Read the current revenue metrics from revenue_data.json. Calculate the
    distance to the £1,000,000 annual ARR target (absolute gap and percent
    complete). Comment on schools signed, parent subscribers and pipeline value.
    Recommend ONE concrete tactical action that would most accelerate ARR this
    week. Today is {date}. Be honest — never sugar-coat the numbers.
  expected_output: >
    A short revenue snapshot: current ARR, gap to £1M, % complete, schools
    signed, parent subscribers, pipeline value. Then exactly ONE clear,
    do-it-today tactical recommendation with a rationale in one sentence.
    End with exactly two lines:
    YOUR ACTION TODAY: [the single most important revenue action right now]
    YOUR QUESTION: [one question you need answered to sharpen the revenue recommendation tomorrow]

pulse_daily_task:
  description: >
    You are compiling the Guided Childhood morning briefing for {date}.
    You have the outputs of all seven specialists as context. Synthesise them
    into a 3-4 sentence executive summary: the single most important thing today,
    where Guided Childhood stands on the £1M ARR mission, and the one action
    to take. Sections marked failed — acknowledge briefly. Then compile a
    clean, scannable briefing with one clearly labelled section per agent.
    Note any cross-agent connections explicitly (e.g. Diego built on Scout's
    finding about X; Sage's hook and Diego's Substack companion are aligned).
  expected_output: >
    A 3-4 sentence executive summary followed by labelled sections for each
    agent (Research, Safeguarding, LinkedIn Targets, Today's Post, Content Series
    & Substack, PR, Revenue). Highlight cross-agent connections. Suitable for
    rendering into an HTML email.

pulse_weekly_task:
  description: >
    Chair the Guided Childhood weekly Monday meeting for the week of {date}.
    As manager, coordinate all seven specialists so information genuinely flows
    between them: Scout's intelligence must inform Sage, Diego and Herald's
    angles; Guardian's safeguarding read must inform Navigator's outreach framing;
    Diego must build the content series on Scout's strongest finding;
    Compass must tie every recommendation back to the £1M ARR mission.
    Delegate tasks, ask follow-up questions between agents, and surface
    cross-agent dependencies explicitly.
  expected_output: >
    A weekly strategic briefing: top 3 priorities for the week, each agent's
    key contribution and assigned action, explicit cross-agent hand-offs
    (who passes what to whom), and a single most-important focus for hitting
    £1M ARR while keeping children safer online.
