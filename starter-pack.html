<style>

.spots-bar{height:6px;background:var(--border);border-radius:99px;margin:10px 0 14px;overflow:hidden}
.spots-fill{height:100%;border-radius:99px;background:var(--coral);width:74%}

      say:'"You seem really flat lately, and I notice it often happens after you come off your phone. I am not saying that to accuse you. I am worried about you."',
      A:{h:'"I\'m fine"',s:'"Okay. I am not going to push. I want you to know I am here and I will not overreact if you do tell me something."'},
      B:{h:'Opens up',s:'"Thank you for telling me that." [listen fully] "That sounds really hard. What do you need from me?"'},
      C:{h:'Signs of something serious',s:'"I am worried. I am not angry. Can we see the doctor together? Not because something is wrong with you, because I want you to have more support than just me."'},
      agree:'"Once a week, no agenda. You do not have to talk. The door is always open."'
    }
  },
  'online-safety':{
    young:{
      experts:'Sue Atkins · Dr Becky Kennedy',
      method:'Competence, not fear',
      prep:'Use "what would you do if" questions, not warnings. Start before there is a problem.',
      say:'"If someone you did not know asked you for your name or address online, what would you do? There is no wrong answer, I just want to know what you think."',
      A:{h:'Good instincts',s:'"That is exactly right. And you can always come and tell me, even if you are not sure, even if you did something you were not supposed to."'},
      B:{h:'Unsure',s:'"Our family rule: if anyone online wants your name, address, or a photo, the answer is always no, and you come and tell me. Always."'},
      C:{h:'Something has already happened',s:'"Tell me everything. I am not going to be cross with you." Then: "You did the right thing telling me. We are going to sort this out together."'},
      agree:'"Anything weird, scary, or confusing online, you tell me straight away. I will never be angry at you for telling me."'
    },
    middle:{
      experts:'Catherine Knibbs · Dr Dan Siegel',
      method:'Build competence not fear',
      prep:'Ages 8 to 11 are highest risk. Curiosity-based questions activate reasoning, not fear.',
      say:'"I want to talk to you about something important, and I want to know what you think, not just tell you what I think. Are you up for that?"',
      A:{h:'Unknown contact or message',s:'"Tell me everything about this person. What have they asked? What have you told them?" Block and report together.'},
      B:{h:'Upsetting content',s:'"Tell me about it. All of it, you are not in trouble. What did it feel like when you saw it?"'},
      C:{h:'Peer conflict online',s:'"That sounds really awful. Tell me what happened from the beginning. I am just going to listen first."'},
      agree:'"Anything uncomfortable online, you tell me first. Telling me protects your access. Hiding it is the only thing that risks it."'
    },
    teen:{
      experts:'Catherine Knibbs · Dr Becky Kennedy',
      method:'The relationship is the only safeguard',
      prep:'Filters and monitoring are secondary. The relationship that makes them want to tell you is everything.',
      say:'"I want to understand your experience online. And I want you to know you can come to me with anything. Anything. I will not overreact."',
      A:{h:'Someone making them uncomfortable',s:'"Tell me what has been happening. How is it making you feel?" Then: "What do you want to do about it?"'},
      B:{h:'Something serious they have seen',s:'"Thank you for telling me. Before we do anything, how are you? Tell me how you feel about what you saw."'},
      C:{h:'An image or privacy issue',s:'"I am not angry. I need to understand what happened so we can sort it together. Tell me everything."'},
      agree:'"Whatever happens online, I want to be your first call. I will not take your device away as a punishment for coming to me."'
    }
  }
};

function getLastSession() {
  try { return JSON.parse(localStorage.getItem('gc_last')) || null; }
  catch(e){ return null; }
}
function saveSession(stageId, st, conv) {
  try {
    localStorage.setItem('gc_last', JSON.stringify({
      date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}),
      stage: 'Stage ' + stageId + ': ' + st.name,
      ages: st.ages,
      action: st.action,
      agree: conv ? conv.agree : null
    }));
  } catch(e){}
}

function renderConvTab(stageId, challenge) {
  const issueKey = CHALLENGE_TO_ISSUE[challenge] || 'screen-end';
  const ageKey = STAGE_AGE[stageId] || 'middle';
  const d = CONV[issueKey] && CONV[issueKey][ageKey];
  if (!d) return '<p style="color:var(--ink-muted);font-size:.9rem">Full conversation scripts available on the platform.</p>';

  return `
  <div class="expert-badge">${d.experts}</div>
  <h2 style="font-size:1.05rem;margin-bottom:6px">${d.method}</h2>
  <div class="box" style="background:var(--cream);padding:11px 14px;margin-bottom:14px;border:none">
    <span style="font-family:var(--mono);font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:4px">Before you start</span>
    <p style="font-size:.85rem;color:var(--ink-soft)">${d.prep}</p>
  </div>

  <div class="conv-say">${d.say}</div>

  <p style="font-family:var(--mono);font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin:16px 0 10px">How do they respond?</p>

  <div class="conv-resp">
    <span class="rl">A</span>
    <div><div class="rh">${d.A.h}</div><div class="rs">${d.A.s}</div></div>
  </div>
  <div class="conv-resp">
    <span class="rl">B</span>
    <div><div class="rh">${d.B.h}</div><div class="rs">${d.B.s}</div></div>
  </div>
  <div class="conv-resp">
    <span class="rl">C</span>
    <div><div class="rh">${d.C.h}</div><div class="rs">${d.C.s}</div></div>
  </div>

  <div class="conv-agree">
    <span style="font-family:var(--mono);font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dark);display:block;margin-bottom:8px">The agreement to make</span>
    <p style="font-size:.95rem;font-style:italic;color:var(--ink);font-weight:600;line-height:1.6">${d.agree}</p>
  </div>

  <div style="margin-top:16px;padding:14px 16px;background:var(--warm);border:1px solid var(--border);border-radius:12px;text-align:center">
    <p style="font-size:.82rem;color:var(--ink-soft);margin-bottom:10px">The full conversation tree walks you through every possible response, step by step.</p>
    <a href="/scripts" style="font-family:var(--mono);font-size:.78rem;font-weight:600;color:var(--green-dark);text-decoration:none">See the full conversation script &rarr;</a>
  </div>`;
}

function renderSidebar(stageId, st, conv, last) {
  const agree = conv ? conv.agree : null;
  const isCritical = stageId === 3;

  const lastCard = last ? `
  <div class="sc" style="background:var(--lav);border-color:rgba(61,91,169,.25)">
    <span class="sc-lbl" style="color:var(--lav-deep)">Last session &middot; ${last.date}</span>
    <p style="font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--ink)">${last.stage} &middot; ${last.ages}</p>
    <p style="font-size:.78rem;color:var(--ink-soft);line-height:1.55">${last.action.length > 130 ? last.action.slice(0,127) + '...' : last.action}</p>
    ${last.agree ? `<p style="font-size:.78rem;font-style:italic;color:var(--lav-deep);margin-top:10px;padding-top:10px;border-top:1px solid rgba(61,91,169,.2);line-height:1.5">${last.agree}</p>` : ''}
  </div>` : '';

  const actionCard = `
  <div class="sc" style="background:var(--green-lt);border-color:var(--green)">
    <span class="sc-lbl" style="color:var(--green-dark)">Tonight's action</span>
    <p style="font-size:.88rem;font-weight:600;color:var(--ink);line-height:1.6">${st.action}</p>
  </div>`;

  const agreeCard = agree ? `
  <div class="sc" style="background:var(--gold-lt);border:2px dashed var(--gold-dark)">
    <span class="sc-lbl" style="color:var(--gold-dark)">The agreement</span>
    <p style="font-size:.9rem;font-style:italic;font-weight:600;color:var(--ink);line-height:1.6">${agree}</p>
    <p style="font-size:.72rem;color:var(--ink-muted);margin-top:8px">From the Conversation tab. Walk through the full script first.</p>
  </div>` : '';

  const signsCard = `
  <div class="sc">
    <span class="sc-lbl">Watch for these</span>
    ${st.watch.map(w => `<div class="sc-sign"><span style="color:var(--coral);font-weight:800;flex-shrink:0;margin-top:1px;font-size:.85rem">!</span><span>${w}</span></div>`).join('')}
    ${isCritical ? '<p style="font-size:.72rem;color:var(--coral);margin-top:8px;font-weight:600;padding-top:8px;border-top:1px solid var(--coral-lt)">Cambridge research identifies this as the peak sensitivity window, especially for girls.</p>' : ''}
  </div>`;

  const digiCard = `
  <div class="sc" style="background:var(--ink);border-color:var(--ink)">
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px">
      <div class="digi-av">D</div>
      <div>
        <span class="sc-lbl" style="color:var(--green);margin-bottom:4px">Ask DiGi</span>
        <p style="font-size:.88rem;color:#fff;font-weight:700;line-height:1.3">Your AI parenting advisor</p>
      </div>
    </div>
    <p style="font-size:.8rem;color:rgba(255,255,255,.7);margin-bottom:16px;line-height:1.65">Ask anything about the script, the conversation you are planning, or what to try next. Available to all members.</p>
    <a href="https://mailchi.mp/thesocialbillboard/parents" target="_blank" rel="noopener" style="display:block;text-align:center;background:var(--green);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:.8rem;padding:13px 16px;border-radius:12px;text-decoration:none;letter-spacing:.02em">Get early access to DiGi &rarr;</a>
  </div>`;

  const joinCard = `
  <div class="join-sc">
    <span class="sc-lbl" style="color:var(--gold-dark)">Founder rate</span>
    <p style="font-weight:800;font-size:1.15rem;margin-bottom:2px">&pound;7.99 a month</p>
    <p style="font-size:.78rem;color:var(--ink-soft);margin-bottom:2px">For life. First 50 members only.</p>
    <div class="spots-bar"><div class="spots-fill"></div></div>
    <p style="font-family:var(--mono);font-size:.65rem;font-weight:700;color:var(--coral);letter-spacing:.06em;margin-bottom:14px">37 OF 50 SPOTS TAKEN</p>
    <a class="btn" href="https://mailchi.mp/thesocialbillboard/parents" target="_blank" rel="noopener" style="display:block;text-align:center;justify-content:center;width:100%;padding:14px">Join at founder rate &rarr;</a>
    <p style="font-size:.7rem;color:var(--ink-muted);margin-top:10px">Full platform: all 5 stages, 17 scripts, DiGi advisor, wellbeing tracker.</p>
  </div>`;

  return lastCard + actionCard + agreeCard + signsCard + digiCard + joinCard;
}

let step = 0, answers = [];

function start(){
  document.getElementById('s-welcome').classList.add('hide');
  document.getElementById('s-q').classList.remove('hide');
  renderQ();
}
function renderQ(){
  const q = questions[step];
  document.querySelectorAll('#prog span').forEach((s,i)=>s.classList.toggle('on', i<=step));
  document.getElementById('q-body').innerHTML =
    '<div class="fade"><h2>'+q.q+'</h2><p style="color:var(--ink-muted);font-size:.88rem;margin-bottom:20px">'+q.sub+'</p>'+
    q.opts.map((o,i)=>'<button class="opt" onclick="pick(\''+o.replace(/'/g,"\\'")+'\')">' +
      '<span class="n">'+(i+1)+'</span>'+o+'</button>').join('')+'</div>';
  window.scrollTo({top:0});
}
function pick(val){
  answers[step] = val;
  if(step < 2){ step++; renderQ(); }
  else renderResult();
}
function renderResult(){
  const last = getLastSession();
  const stageId = ageMap[answers[0]];
  const st = stages[stageId];
  const issueKey = CHALLENGE_TO_ISSUE[answers[1]] || 'screen-end';
  const ageKey = STAGE_AGE[stageId] || 'middle';
  const conv = (CONV[issueKey] && CONV[issueKey][ageKey]) || null;

  saveSession(stageId, st, conv);

  document.getElementById('quiz-wrap').classList.add('hide');
  const r = document.getElementById('s-r');
  r.classList.remove('hide');

  r.innerHTML = `
  <div class="fade result-grid">
    <div class="r-main">
      <div style="border:1px solid var(--border);border-left:5px solid ${st.bar};border-radius:14px;background:${st.wash};padding:22px;margin-top:10px">
        ${st.critical ? '<span class="pill" style="background:var(--coral);color:#fff;margin-bottom:10px">The Critical Window</span>' : ''}
        <div style="font-family:var(--mono);font-size:.62rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-muted);margin:8px 0 4px">${st.ks} &middot; ${st.us}</div>
        <h1 style="font-size:1.7rem;margin-bottom:2px">Stage ${stageId}: ${st.name}</h1>
        <div style="font-weight:700;color:var(--ink-soft);margin-bottom:10px">${st.ages}</div>
        <p style="font-size:.92rem;color:var(--ink-soft)">${st.summary}</p>
        <p style="font-size:.82rem;color:${st.deep};font-weight:700;margin-top:10px">Device right now: ${st.device}</p>
      </div>

      <div class="card" style="background:var(--gold-lt);margin-top:14px">
        <span class="lbl" style="color:var(--gold-dark)">Your situation</span>
        <p style="font-size:.92rem;color:var(--ink-soft)">${challengeNotes[answers[1]]}</p>
        <p style="font-size:.88rem;color:var(--ink-soft);margin-top:8px;font-style:italic">${feelNotes[answers[2]]}</p>
      </div>

      <div class="tabs">
        <button class="tab on" onclick="tab(this,'t-script')">Script</button>
        <button class="tab" onclick="tab(this,'t-conv')">Conversation</button>
        <button class="tab" onclick="tab(this,'t-action')">Action</button>
        <button class="tab" onclick="tab(this,'t-signs')">Signs</button>
        <button class="tab" onclick="tab(this,'t-next')">Next</button>
      </div>

      <div id="t-script">
        <h2 style="font-size:1.15rem">${st.script.title}</h2>
        <p style="font-size:.8rem;color:var(--ink-muted);margin-bottom:14px">Use it word for word. Tonight if possible.</p>
        <div class="box" style="background:var(--green-lt);border-left:4px solid var(--green-dark)">
          <span class="lbl" style="color:var(--green-dark)">Say this</span>
          <p style="font-size:.95rem;font-style:italic">"${st.script.say}"</p>
        </div>
        <div class="box" style="background:var(--coral-lt);border-left:4px solid var(--coral)">
          <span class="lbl" style="color:var(--coral)">Not this</span>
          <p style="font-size:.95rem;font-style:italic">"${st.script.not}"</p>
        </div>
        <div class="box" style="background:var(--gold-lt);border-left:4px solid var(--gold-dark)">
          <span class="lbl" style="color:var(--gold-dark)">Why it works</span>
          <p style="font-size:.88rem;color:var(--ink-soft)">${st.script.why}</p>
        </div>
      </div>

      <div id="t-conv" class="hide">
        ${renderConvTab(stageId, answers[1])}
      </div>

      <div id="t-action" class="hide">
        <h2 style="font-size:1.15rem">Your highest-impact action</h2>
        <div class="box" style="background:var(--warm);margin-top:12px">
          <p style="font-size:.95rem;font-weight:600">${st.action}</p>
        </div>
      </div>

      <div id="t-signs" class="hide">
        <h2 style="font-size:1.15rem">Warning signs at this stage</h2>
        <p style="font-size:.8rem;color:var(--ink-muted);margin-bottom:14px">Most things are fine. This helps you tell the difference.</p>
        <div class="box" style="background:var(--green-lt);border-left:4px solid var(--green-dark)">
          <span class="lbl" style="color:var(--green-dark)">This is normal</span>
          ${st.normal.map(w=>'<div class="sig"><b style="color:var(--green-dark)">&#10003;</b>'+w+'</div>').join('')}
        </div>
        <div class="box" style="background:var(--coral-lt);border-left:4px solid var(--coral)">
          <span class="lbl" style="color:var(--coral)">Worth a closer look</span>
          ${st.watch.map(w=>'<div class="sig"><b style="color:var(--coral)">!</b>'+w+'</div>').join('')}
        </div>
        <p style="font-size:.75rem;color:var(--ink-muted);margin-top:10px">Seriously concerned? Contact your GP, CAMHS, or the NSPCC on 0808 800 5000. Immediate danger: call 999.</p>
      </div>

      <div id="t-next" class="hide">
        <h2 style="font-size:1.15rem">This is page one of the pathway</h2>
        <p style="font-size:.9rem;color:var(--ink-soft);margin:10px 0 16px">The full platform has all five stages, 17 scripts for every hard moment, DiGi the AI advisor available any time, the weekly wellbeing tracker, and the complete home curriculum.</p>
        <div class="box" style="background:var(--gold-lt);text-align:center;padding:24px 18px">
          <p style="font-weight:800;font-size:1.05rem;margin-bottom:4px">Save your child's pathway</p>
          <p style="font-size:.82rem;color:var(--ink-soft);margin-bottom:16px">Join free and be first in when we launch. Founder rate locked at &pound;7.99 a month for life, first 50 members only.</p>
          <a class="btn" href="https://mailchi.mp/thesocialbillboard/parents" target="_blank" rel="noopener">Save my pathway &rarr;</a>
        </div>
        <div class="box" style="background:var(--warm);text-align:center;padding:20px 18px;margin-top:10px">
          <p style="font-weight:700;font-size:.92rem;margin-bottom:4px">Want a clearer picture first?</p>
          <p style="font-size:.8rem;color:var(--ink-soft);margin-bottom:14px">The free Digital Health Check reads the signals in your child's online world in five minutes.</p>
          <a href="/digitalwellbeing" style="font-family:var(--mono);font-size:.8rem;font-weight:600;color:var(--green-dark)">Take the free Digital Health Check &rarr;</a>
        </div>
        <button onclick="location.reload()" style="width:100%;margin-top:14px;background:none;border:1px solid var(--border);border-radius:14px;padding:12px;font-family:var(--mono);font-size:.72rem;letter-spacing:.04em;color:var(--ink-muted);cursor:pointer">Build a pack for another child</button>
        <a href="/" style="display:block;text-align:center;margin-top:12px;font-family:var(--mono);font-size:.72rem;letter-spacing:.04em;color:var(--green-dark);text-decoration:none;padding:12px">&larr; Back to guidedchildhood.com</a>
      </div>
    </div>

    <div class="sidebar">
      ${renderSidebar(stageId, st, conv, last)}
    </div>
  </div>`;

  window.scrollTo({top:0});
}
function tab(btn, id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  ['t-script','t-conv','t-action','t-signs','t-next'].forEach(t=>document.getElementById(t).classList.add('hide'));
  document.getElementById(id).classList.remove('hide');
}
</script>
</body>
</html>
