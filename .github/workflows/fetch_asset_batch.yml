          MANIFEST
          if [ -n "$fails" ]; then echo "failed keys:$fails"; fi

      - name: Commit and push assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/devices public/moments
          git commit -m "CI: fetch Higgsfield asset batch (devices and moments)"
          git push origin HEAD
