name: Fetch Higgsfield asset batch

# Temporary workflow. The Claude Code sandbox egress proxy blocks the
# Higgsfield CDN, so this job downloads the generated images on a runner,
# downscales them to 512px, and pushes them back to the branch. It is
# removed again in the follow up commit once the assets have landed.

on:
  workflow_dispatch: {}     # manual only

permissions:
  contents: write           # push the downloaded assets back to the branch

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and downscale assets
        run: |
          set -euo pipefail
          command -v convert >/dev/null || { sudo apt-get update && sudo apt-get install -y imagemagick; }
          BASE="https://d8j0ntlcm91z4.cloudfront.net/user_3DfAawD3Umi5iqU3oLyR59j3JKD"
          mkdir -p public/devices public/moments
          fails=""
          while read -r dir key fname; do
            [ -z "$dir" ] && continue
            out="public/$dir/$key.png"
            ok=0
            for attempt in 1 2; do
              if curl -sf --retry 2 "$BASE/$fname" -o /tmp/asset.png; then ok=1; break; fi
              sleep 3
            done
            if [ "$ok" = "1" ]; then
              convert /tmp/asset.png -resize 512x512\> "$out"
              echo "saved $out"
            else
              echo "FAILED $dir/$key"
              fails="$fails $dir/$key"
            fi
          done <<'MANIFEST'
          devices iphone hf_20260704_114409_02addd52-2251-442e-90ad-956e05c2fc36.png
          devices android hf_20260704_114422_e0ba0b1b-0a38-423f-b618-4ace72fbcc42.png
          devices firetablet hf_20260704_114425_be8868f9-589e-4cb8-9dc5-cd2e1b1616f5.png
          devices switch hf_20260704_114427_b86805a3-4974-4f4e-88bb-ad543056bf1f.png
          devices xbox hf_20260704_114429_0329f116-07e0-4616-88e9-f8fdf229a9eb.png
          devices playstation hf_20260704_114431_7c1c2745-9585-4538-b483-6aa6215d3fa5.png
          devices roblox hf_20260704_114433_97ccaac6-6b85-418d-8b86-331e6d43c3f5.png
          devices youtube hf_20260704_114444_e61d8a7c-1289-4b20-b532-edf459799e58.png
          devices alexa hf_20260704_114446_62177e08-946f-4fe2-b38c-654a4d338efb.png
          devices firestick hf_20260704_114452_48830599-e326-4858-9efc-cd2e7c53a700.png
          devices appletv hf_20260704_114453_1a31bc9f-a7bc-4848-82f9-7bb6b4e79df6.png
