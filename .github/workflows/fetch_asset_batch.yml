          devices chromebook hf_20260704_114504_a4725b0b-f458-4f74-aa84-7685b2d24ccc.png
          devices windows hf_20260704_114506_a56982af-944b-4a26-a179-45c8ac458b8f.png
          devices tiktok hf_20260704_114509_fbfc77b8-1f6f-4849-a879-60bb9031bd62.png
          devices snapchat hf_20260704_114512_5b014617-1d8c-4cdc-99ac-d9d70de0d95f.png
          devices instagram hf_20260704_114513_cbd080c6-344e-4a92-84f4-690ef26ddcf8.png
