name: Daily Agent Briefing

on:
  workflow_dispatch: {}     # manual only — trigger from Actions tab or by request

permissions:
  contents: write           # needed to push outputs and memory back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run daily briefing
        run: python agents/daily_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit agent outputs and memory to repo
        run: |
          git config user.name  "Guided Childhood Agents"
          git config user.email "agents@guidedchildhood.co.uk"
          git add agents/outputs/latest.json agents/memory/
          git diff --cached --quiet || git commit -m "chore: agent run + memory update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
